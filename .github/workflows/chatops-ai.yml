name: AI ChatOps Assistant

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  ai-chatops:
    if: github.event.issue.pull_request && contains(github.event.comment.body, '@bot')
    runs-on: ubuntu-latest
    environment:
      name: devops-dev

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract PR metadata
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber
            });

            const report = {
              number: pr.number,
              title: pr.title,
              body: pr.body,
              author: pr.user.login,
              labels: pr.labels.map(l => l.name),
              changed_files: pr.changed_files
            };

            require('fs').writeFileSync(
              'chatops-input.json',
              JSON.stringify(report, null, 2)
            );

      - name: Ensure ChatOps input file exists
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -f chatops-input.json ]]; then
            echo '{}' > chatops-input.json
          fi

      - name: Generate AI response
        id: ai
        continue-on-error: true
        uses: ./.github/azure-openai-chat
        with:
          endpoint: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          api_key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          deployment: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          api_version: "2024-02-15-preview"
          system_prompt_file: "ai/prompts/chatops.prompt.md"
          user_input_file: "chatops-input.json"
          output_file: "chatops-output.md"
          temperature: "0.1"

      - name: Debug Azure OpenAI failure details
        if: always() && steps.ai.outcome == 'failure'
        shell: bash
        run: |
          set -euo pipefail
          echo "::warning::Azure OpenAI step failed. Printing sanitized diagnostics."
          if [[ -f .aoai.response.json ]]; then
            STATUS=$(jq -r '.statusCode // .status // empty' .aoai.response.json)
            ERROR_CODE=$(jq -r '.error.code // empty' .aoai.response.json)
            ERROR_MESSAGE=$(jq -r '.error.message // empty' .aoai.response.json)

            [[ -n "$STATUS" ]] && echo "HTTP status: $STATUS" || echo "HTTP status: (not present in body)"
            [[ -n "$ERROR_CODE" ]] && echo "Error code: $ERROR_CODE" || echo "Error code: (not present)"
            [[ -n "$ERROR_MESSAGE" ]] && echo "Error message: $ERROR_MESSAGE" || echo "Error message: (not present)"
          else
            echo "No .aoai.response.json found; failure likely occurred before API response was written."
          fi

      - name: Fail job when AI step fails
        if: always() && steps.ai.outcome == 'failure'
        shell: bash
        run: |
          echo "Failing job because Generate AI response step failed."
          exit 1

      - name: Post response to PR
        if: steps.ai.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('chatops-output.md', 'utf8');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `🤖 AI Assistant Response:\n\n${body}`
            });