name: Safe Azure OpenAI Call

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "What to generate"
        required: true
        default: "release-notes-smoke-test"

jobs:
  call-ai-safely:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets exist
        shell: bash
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          set -euo pipefail
          [[ -n "${AZURE_OPENAI_ENDPOINT}" ]] || (echo "Missing secret AZURE_OPENAI_ENDPOINT" && exit 1)
          [[ -n "${AZURE_OPENAI_API_KEY}" ]] || (echo "Missing secret AZURE_OPENAI_API_KEY" && exit 1)
          [[ -n "${AZURE_OPENAI_DEPLOYMENT}" ]] || (echo "Missing secret AZURE_OPENAI_DEPLOYMENT" && exit 1)

      - name: Build deterministic prompt + input
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts

          cat > artifacts/input.json <<'JSON'
          {
            "generated_at": "REPLACE_AT_RUNTIME",
            "repository": "REPLACE_AT_RUNTIME",
            "pull_requests": [
              {
                "number": 123,
                "title": "Add /version endpoint to expose build metadata",
                "labels": ["release:minor", "area:api"],
                "author": "example-user",
                "body": "Adds a lightweight endpoint for build/version visibility."
              }
            ]
          }
          JSON

          # Replace placeholders deterministically
          NOW="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          jq --arg now "$NOW" --arg repo "${GITHUB_REPOSITORY}" \
            '.generated_at=$now | .repository=$repo' \
            artifacts/input.json > artifacts/input.runtime.json

          cat > artifacts/system.prompt.txt <<'PROMPT'
          You are an AI assistant integrated into a DevOps CI/CD pipeline.

          RULES:
          - Use ONLY the provided JSON input.
          - Do NOT infer changes not present in the JSON.
          - Output MUST be GitHub-flavored markdown using this exact structure:

          ## Features
          ## Fixes
          ## Infrastructure
          ## Breaking Changes

          - If a section has no items, write "- None".
          PROMPT

      - name: Call Azure OpenAI (safe)
        id: aoai
        shell: bash
        env:
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
        run: |
          set -euo pipefail

          # Never echo secrets
          echo "::add-mask::${AZURE_OPENAI_API_KEY}"

          SYSTEM_PROMPT="$(cat artifacts/system.prompt.txt)"
          USER_INPUT="$(cat artifacts/input.runtime.json)"

          BODY="$(jq -n \
            --arg system "$SYSTEM_PROMPT" \
            --arg user "$USER_INPUT" \
            '{
              messages: [
                {role:"system", content:$system},
                {role:"user", content:$user}
              ],
              temperature: 0.1
            }')"

          RESPONSE_FILE="artifacts/aoai.response.json"

          # Use --fail-with-body to capture HTTP errors without dumping secrets
          http_code=$(curl -sS -o "$RESPONSE_FILE" -w "%{http_code}" \
            --request POST \
            "${AZURE_OPENAI_ENDPOINT}/openai/deployments/${AZURE_OPENAI_DEPLOYMENT}/chat/completions?api-version=2024-02-15-preview" \
            --header "Content-Type: application/json" \
            --header "api-key: ${AZURE_OPENAI_API_KEY}" \
            --data "$BODY" || true)

          if [[ "$http_code" -lt 200 || "$http_code" -ge 300 ]]; then
            echo "Azure OpenAI call failed with HTTP $http_code"
            echo "Response saved to $RESPONSE_FILE (may contain error details)."
            exit 1
          fi

          jq -r '.choices[0].message.content // empty' "$RESPONSE_FILE" > artifacts/output.md

          if [[ ! -s artifacts/output.md ]]; then
            echo "Azure OpenAI returned an empty completion."
            exit 1
          fi

      - name: Validate output structure (deterministic contract)
        shell: bash
        run: |
          set -euo pipefail
          test -s artifacts/output.md
          grep -q "^## Features" artifacts/output.md
          grep -q "^## Fixes" artifacts/output.md
          grep -q "^## Infrastructure" artifacts/output.md
          grep -q "^## Breaking Changes" artifacts/output.md

      - name: Upload artifacts (traceability)
        uses: actions/upload-artifact@v4
        with:
          name: ai-call-safe-artifacts
          path: artifacts/